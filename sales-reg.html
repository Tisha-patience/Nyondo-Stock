<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sales Registration Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/sales-reg.css" />
  </head>
  <body class="bg-#e6e2d3">
    <!-- <div class="container-fluid"> -->
    <nav
      class="navbar navbar-expand-lg navbar-dark"
      style="background-color: #625750"
      data-bs-theme="dark border-bottom bg-dark"
    >
      <div class="container-fluid">
        <a class="navbar-brand px-2">Nyondo Stock System</a>
        <span class="ms-3 text-white">Welcome, Admin</span>

        <div class="d-flex py-2 mx-5" role="search">
          <div class="position-relative">
            <input
              class="form-control ps-5"
              type="search"
              placeholder="Search"
              aria-label="Search"
            />
            <i
              class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"
            ></i>
          </div>
        </div>
      </div>
    </nav>
    <div class="row">
      <div class="col-3 py-2 px-5 sidebar-gradient" style="height: 100vh">
        <h6 class="text-muted mt-3">Menu</h6>
        <div>
          <a class="nav-link text-white active" href="./index.html"
            >Dashboard</a
          >
        </div>
        <br />
        <div>
          <a class="nav-link text-white" href="../sales/salesManagement.html"
            >Sales</a
          >
        </div>
        <br />
        <div>
          <a class="nav-link text-white" href="../supplierRegistration.html"
            >Suppliers</a
          >
        </div>
        <br />
        <div>
          <a class="nav-link text-white" href="./stock.html">Stock</a>
        </div>
        <br />
        <div>
          <a class="nav-link text-white" href="./deposits.html">Deposits</a>
        </div>
        <br />
        <div>
          <a class="nav-link text-white" href="./reports.html">Reports</a>
        </div>
        <br />
        <div>
          <a class="nav-link text-white" href="../transportManagement.html"
            >Transport Charges</a
          >
        </div>
        <br />
        <div>
          <a class="nav-link text-white" href="./settings.html">Settings</a>
        </div>
        <br />
        <div>
          <a class="nav-link text-white" href="./logout.html">Log Out</a>
        </div>
      </div>
      <div class="col-9 py-2">
        <form>
          <!-- Section 1 -->
          <h1 class="text-center">Sales Registration</h1>
          <div class="row my-3">
            <div class="col">
              <label for="formGroupExampleInput" class="form-label"
                >Sales Date</label
              >

              <input type="date" class="form-control" aria-label="First name" />
            </div>

            <div class="col">
              <label for="formGroupExampleInput" class="form-label"
                >Sales Person</label
              >

              <select class="form-select" aria-label="Default select example">
                <option selected>Select sales representative</option>
                <option value="1">One</option>
                <option value="2">Two</option>
                <option value="3">Three</option>
              </select>
            </div>
          </div>
          <!-- end section 1 -->

          <h2 class="text-center my-3">Customer Details</h2>
          <div class="row">
            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Name</label>

              <input
                type="text"
                class="form-control"
                placeholder="Enter Full Name"
                aria-label="Enter Full Name"
              />
            </div>

            <div class="col">
              <label for="formGroupExampleInput" class="form-label"
                >Phone Number</label
              >

              <input
                type="number"
                class="form-control"
                placeholder="Enter phone number"
                aria-label="Enter phone number"
              />
            </div>
          </div>
          <div class="row">
            <div class="col">
              <label for="formGroupExampleInput" class="form-label"
                >Email</label
              >

              <input
                type="email"
                class="form-control"
                placeholder="Enter email"
                aria-label="Enter email"
              />
            </div>

            <div class="col">
              <label for="formGroupExampleInput" class="form-label">Type</label>

              <select class="form-select" aria-label="Default select example">
                <option selected>Select customer type</option>
                <option value="Retail Customer">Retail Customer</option>
                <option value="Whole-sale Customer">Whole-sale Customer</option>
              </select>
            </div>
          </div>
          <!-- end section 2 -->

          <!-- Section 3 -->
          <h2 class="text-center my-3">Items</h2>
          <div class="row my-3">
            <div class="col">
              <label for="formGroupExampleInput" class="form-label"
                >Pdt ID</label
              >

              <input
                type="text"
                class="form-control"
                placeholder=""
                aria-label="First name"
              />
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label"
                >Quantity</label
              >

              <input
                type="number"
                class="form-control"
                placeholder=""
                aria-label="First name"
              />
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label"
                >Unit Price</label
              >

              <input
                type="number"
                class="form-control"
                placeholder=""
                aria-label="First name"
              />
            </div>
          </div>
          <div class="row my-3">
            <div class="col">
              <label for="formGroupExampleInput" class="form-label"
                >Pdt Id</label
              >

              <input
                type="text"
                class="form-control"
                placeholder=""
                aria-label="First name"
              />
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label"
                >Quantity</label
              >

              <input
                type="number"
                class="form-control"
                placeholder=""
                aria-label="First name"
              />
            </div>
            <div class="col">
              <label for="formGroupExampleInput" class="form-label"
                >Unit Price</label
              >

              <input
                type="number"
                class="form-control"
                placeholder=""
                aria-label="First name"
              />
            </div>
          </div>
          <div class="row">
            <div class="col">
              <button type="button" class="btn btn-primary btn-sm">
                Cancel
              </button>
            </div>
            <div class="col text-end">
              <button type="button" class="btn btn-secondary btn-sm">
                Submit
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
