<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supplier Registration Form</title>
    <link rel="stylesheet" href="./css/supplier-reg.css" />
  </head>
  <body>
    <div class="container">
      <!-- Sidebar -->
      <div class="sidebar">
        <h2>Nyondo Stock System</h2>
        <div>
          <a href="../dashboard.html">Dashboard</a>
        </div>
        <br />
        <div>
          <a href="../sales/salesManagement.html">Sales Management</a>
        </div>
        <br />
        <div>
          <a href="../supplierRegistration.html" class="active"
            >Supplier Management</a
          >
        </div>
        <br />
        <div>
          <a href="./stock.html">Stock Management</a>
        </div>
        <br />
        <div>
          <a href="../transportManagement.html">Transport Charges</a>
        </div>
        <br /><br />
        <div class="user-info">Logged in as Admin</div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Top Bar -->
        <form class="action">
          <section>
            <h1>Supplier Registration</h1>
          </section>
          <div class="input-container">
            <div class="input-section">
              <label for="supplierName">Supplier Name:</label>
              <input
                type="text"
                id="supplierName"
                name="supplierName"
                required
              /><br /><br />
            </div>
          </div>

          <div class="input-container">
          <div class="input-section">
            <label for="contactPerson">Contact Person:</label>
            <input
              type="text"
              id="contactPerson"
              name="contactPerson"
              required
            /><br /><br />
          </div>

          <div class="input-section">
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required /><br /><br />
          </div>
          </div>

          <div class="input-container">
          <div class="input-section">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" /><br /><br />
          </div>

          <div class="input-section">
            <label for="address">Company Address:</label>
            <input type="text" id="address" name="address" /><br /><br />
          </div>
          </div>

           <div class="input-container">
          <div class="input-section">
            <label for="supplierType">Supplier Type:</label>
            <select id="supplierType" name="supplierType" required>
              <option value="local">Local</option>
              <option value="international">International</option></select
            ><br /><br />
          </div>

          <div class="input-section">
            <label for="products">Products Supplied:</label>
            <textarea id="products" name="products" rows="4"></textarea
            ><br /><br />
          </div>
          </div>

          
            <label for="paymentTerms">Payment Terms:</label>
            <select id="paymentTerms" name="paymentTerms">
              <option value="cash">Cash</option>
              <option value="credit">Credit</option></select
            ><br /><br />
          

          <div class="form-buttons">
            <button type="reset" class="cancel">Cancel</button>
            <button type="submit" class="submit">Register Supplier</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
